<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>牧場立入記録</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:sans-serif;background:#f0f7f0;color:#1a2e1a;font-size:13px}
.wrap{padding:12px;max-width:820px;margin:0 auto}
.app-header{display:flex;align-items:center;gap:14px;margin-bottom:14px}
.app-icon{width:56px;height:56px;flex-shrink:0;border-radius:14px}
.app-title{font-size:16px;font-weight:500;color:#1a3a1a}
.app-sub{font-size:11px;color:#4a704a;margin-top:2px}
.sync-bar{display:flex;align-items:center;gap:8px;background:#fff;border:0.5px solid #b0d4b0;border-radius:8px;padding:8px 12px;margin-bottom:12px;flex-wrap:wrap}
.sync-bar input{flex:1;min-width:200px;padding:5px 8px;border:0.5px solid #a0c8a0;border-radius:6px;font-size:12px;font-family:sans-serif;background:#f8fcf8;color:#1a2e1a}
.sync-status{font-size:11px;margin-left:auto;display:flex;align-items:center;gap:5px}
.dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.dot-ok{background:#3a9a3a}
.dot-off{background:#aaa}
.dot-err{background:#cc3333}
.tabs{display:flex;gap:0;border-bottom:2px solid #7db87d;margin-bottom:14px;overflow-x:auto}
.tab{padding:7px 14px;cursor:pointer;border:none;background:none;color:#4a704a;font-size:13px;border-bottom:2px solid transparent;margin-bottom:-2px;font-family:sans-serif;white-space:nowrap}
.tab.active{color:#1a5c1a;border-bottom:2px solid #1a5c1a;font-weight:500}
.card{background:#fff;border:0.5px solid #b0d4b0;border-radius:10px;padding:14px;margin-bottom:12px}
.fg{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.fgi{display:flex;flex-direction:column;gap:4px}
.fgi.span2{grid-column:1/-1}
label{font-size:11px;color:#3a5c3a;font-weight:500}
select,input[type=text],input[type=date],input[type=time],input[type=month]{width:100%;padding:6px 8px;border:0.5px solid #a0c8a0;border-radius:6px;background:#f8fcf8;color:#1a2e1a;font-size:13px;font-family:sans-serif}
select:focus,input:focus{outline:2px solid #5ab05a;outline-offset:1px}
.btn-row{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap}
button{padding:7px 14px;border-radius:7px;border:0.5px solid #7db87d;background:#f0f7f0;color:#1a5c1a;font-size:12px;cursor:pointer;font-family:sans-serif;display:flex;align-items:center;gap:5px}
button:hover{background:#dceede}
button.pri{background:#2a7a2a;color:#fff;border-color:#2a7a2a}
button.pri:hover{background:#1a5c1a}
button:disabled{opacity:0.5;cursor:not-allowed}
.stat-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px}
.stat{background:#e8f4e8;border-radius:8px;padding:10px 12px}
.stat .lbl{font-size:11px;color:#3a5c3a}
.stat .val{font-size:20px;font-weight:500;color:#1a3a1a;margin-top:2px}
.srch-row{display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap;align-items:center}
table{width:100%;border-collapse:collapse;font-size:11px;table-layout:fixed}
th{padding:6px 5px;background:#d4ecd4;color:#1a3a1a;font-weight:500;border-bottom:1px solid #a0c8a0;text-align:left;font-size:11px}
td{padding:5px;border-bottom:0.5px solid #d0e8d0;vertical-align:top;word-break:break-word}
tr:hover td{background:#f4fbf4}
.empty{text-align:center;padding:24px;color:#5a805a;font-size:13px}
.msg{padding:8px 12px;border-radius:7px;font-size:12px;margin-bottom:10px}
.msg-ok{background:#d4ecd4;color:#1a5c1a}
.msg-ng{background:#fce8e8;color:#8a2020}
.msg-info{background:#e8f0fe;color:#1a3a8a}
.sect-hd{font-size:13px;font-weight:500;color:#1a3a1a;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.master-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.master-item{background:#f8fcf8;border:0.5px solid #b0d4b0;border-radius:8px;padding:10px}
.master-item h4{font-size:12px;font-weight:500;color:#1a3a1a;margin-bottom:6px}
.master-list{list-style:none;max-height:100px;overflow-y:auto}
.master-list li{display:flex;justify-content:space-between;align-items:center;padding:3px 0;border-bottom:0.5px solid #e0eee0;font-size:12px}
.master-list li:last-child{border-bottom:none}
.del-btn{background:none;border:none;color:#c05050;cursor:pointer;font-size:14px;padding:0 4px;font-family:sans-serif}
.add-row{display:flex;gap:6px;margin-top:6px}
.add-row input{flex:1;padding:5px 7px;border:0.5px solid #a0c8a0;border-radius:5px;background:#fff;font-size:12px;font-family:sans-serif}
.add-row button{padding:5px 10px;font-size:12px}
.pdf-box{background:#f0f9f0;border:0.5px solid #90c890;border-radius:10px;padding:14px;margin-bottom:10px}
.pbhd{font-size:13px;font-weight:500;color:#1a3a1a;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.mode-row{display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap}
.modeBtn{padding:6px 14px;border-radius:20px;border:0.5px solid #7db87d;background:#fff;color:#3a6a3a;font-size:12px;cursor:pointer;font-family:sans-serif}
.modeBtn.sel{background:#2a7a2a;color:#fff;border-color:#2a7a2a}
.cond-row{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:10px}
.cond-row label{font-size:12px;color:#3a5c3a;white-space:nowrap;font-weight:normal}
.cnt-badge{display:inline-block;background:#d4ecd4;color:#1a5c1a;border-radius:12px;padding:2px 10px;font-size:12px;margin-left:8px}
.companion-list{display:flex;flex-direction:column;gap:6px;margin-top:8px}
.companion-row{display:grid;grid-template-columns:1fr 1fr 1fr auto;gap:6px;align-items:center;background:#f0f9f0;border:0.5px solid #b0d4b0;border-radius:7px;padding:7px 8px}
.companion-row input{padding:5px 7px;border:0.5px solid #a0c8a0;border-radius:5px;background:#fff;font-size:12px;font-family:sans-serif;width:100%}
.rm-btn{background:none;border:none;color:#c05050;cursor:pointer;font-size:18px;padding:0 4px;line-height:1;font-family:sans-serif}
.companion-tag{display:inline-block;background:#e0f0e0;color:#1a5c1a;border-radius:5px;padding:1px 6px;font-size:10px;margin-top:2px;margin-right:2px}
.spinner{display:inline-block;width:12px;height:12px;border:2px solid #a0c8a0;border-top-color:#2a7a2a;border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
#lock-screen{position:fixed;inset:0;background:#f0f7f0;display:flex;align-items:center;justify-content:center;z-index:9999}
#lock-screen.hidden{display:none}
.lock-box{background:#fff;border:0.5px solid #b0d4b0;border-radius:16px;padding:36px 32px;width:320px;text-align:center;box-shadow:0 4px 24px rgba(0,0,0,0.08)}
.lock-icon{font-size:48px;margin-bottom:12px}
.lock-title{font-size:18px;font-weight:500;color:#1a3a1a;margin-bottom:4px}
.lock-sub{font-size:12px;color:#5a805a;margin-bottom:20px}
.lock-input{width:100%;padding:10px 12px;border:0.5px solid #a0c8a0;border-radius:8px;font-size:16px;text-align:center;letter-spacing:4px;background:#f8fcf8;color:#1a2e1a;font-family:sans-serif;margin-bottom:10px}
.lock-input:focus{outline:2px solid #5ab05a;outline-offset:1px}
.lock-btn{width:100%;padding:10px;border-radius:8px;border:none;background:#2a7a2a;color:#fff;font-size:14px;font-weight:500;cursor:pointer;font-family:sans-serif}
.lock-btn:hover{background:#1a5c1a}
.lock-err{font-size:12px;color:#cc2222;margin-top:8px;min-height:18px}
.lock-hint{font-size:11px;color:#8a8a8a;margin-top:12px}
</style>
</head>
<body>

<!-- パスワードロック画面 -->
<div id="lock-screen">
  <div class="lock-box">
    <div class="lock-icon">🔒</div>
    <div class="lock-title">飼養衛生管理区域 立入記録</div>
    <div class="lock-sub">パスワードを入力してください</div>
    <input type="password" class="lock-input" id="lock-pw" placeholder="••••••" onkeydown="if(event.key==='Enter')checkPw()">
    <button class="lock-btn" onclick="checkPw()">ログイン</button>
    <div class="lock-err" id="lock-err"></div>
    <div class="lock-hint">※ パスワードは管理者にお問い合わせください</div>
  </div>
</div>

<div class="wrap" id="main-wrap" style="display:none">

<div class="app-header">
  <svg class="app-icon" viewBox="0 0 160 160" xmlns="http://www.w3.org/2000/svg">
    <rect width="160" height="160" rx="36" ry="36" fill="#d42222"/>
    <circle cx="26" cy="26" r="5" fill="#fff" opacity="0.18"/>
    <circle cx="134" cy="26" r="5" fill="#fff" opacity="0.18"/>
    <circle cx="26" cy="134" r="5" fill="#fff" opacity="0.18"/>
    <circle cx="134" cy="134" r="5" fill="#fff" opacity="0.18"/>
    <circle cx="80" cy="20" r="3" fill="#fff" opacity="0.13"/>
    <circle cx="80" cy="140" r="3" fill="#fff" opacity="0.13"/>
    <text x="84" y="82" text-anchor="middle" font-family="Georgia,'Times New Roman',serif" font-size="48" font-weight="bold" font-style="italic" fill="#990000" opacity="0.55" letter-spacing="-1">牧場</text>
    <text x="84" y="130" text-anchor="middle" font-family="Georgia,'Times New Roman',serif" font-size="48" font-weight="bold" font-style="italic" fill="#990000" opacity="0.55" letter-spacing="-1">立入</text>
    <text x="80" y="80" text-anchor="middle" font-family="Georgia,'Times New Roman',serif" font-size="48" font-weight="bold" font-style="italic" fill="#fff" letter-spacing="-1">牧場</text>
    <text x="80" y="128" text-anchor="middle" font-family="Georgia,'Times New Roman',serif" font-size="48" font-weight="bold" font-style="italic" fill="#fff" letter-spacing="-1">立入</text>
  </svg>
  <div>
    <div class="app-title">飼養衛生管理区域 立入記録</div>
    <div class="app-sub">家畜伝染病予防法に基づく立入者記録の入力・管理</div>
  </div>
</div>

<!-- クラウド接続設定バー -->
<div class="sync-bar">
  <i class="ti ti-cloud" style="font-size:16px;color:#3a7a3a;flex-shrink:0"></i>
  <input type="text" id="gas-url" placeholder="Apps Script のウェブアプリURLをここに貼り付けてください" oninput="saveUrl()">
  <button onclick="syncNow()" id="sync-btn"><i class="ti ti-refresh"></i> 今すぐ同期</button>
  <div class="sync-status">
    <span class="dot dot-off" id="sync-dot"></span>
    <span id="sync-label" style="font-size:11px;color:#5a805a">未接続</span>
  </div>
</div>

<div class="tabs">
  <button class="tab active" onclick="showTab('entry')">新規入力</button>
  <button class="tab" onclick="showTab('list')">記録一覧</button>
  <button class="tab" onclick="showTab('pdf')">PDF出力</button>
  <button class="tab" onclick="showTab('master')">選択肢管理</button>
</div>

<div id="pane-entry">
  <div id="fmsg" style="display:none"></div>
  <div class="card">
    <div class="sect-hd"><i class="ti ti-calendar"></i>日時</div>
    <div class="fg">
      <div class="fgi"><label>立入年月日 *</label><input type="date" id="f-date"></div>
      <div class="fgi"><label>立入時刻</label><input type="time" id="f-time"></div>
    </div>
  </div>
  <div class="card">
    <div class="sect-hd"><i class="ti ti-user"></i>主たる立入者</div>
    <div class="fg">
      <div class="fgi"><label>所属会社・機関 *</label><input type="text" id="f-org" placeholder="選択または直接入力" list="dl-orgs" oninput="onOrgChange()"></div>
      <div class="fgi"><label>氏名 *</label><input type="text" id="f-name" placeholder="選択または直接入力" list="dl-names-pred"></div>
      <div class="fgi"><label>役職・資格</label><input type="text" id="f-role" placeholder="選択または直接入力" list="dl-roles"></div>
      <div class="fgi"><label>連絡先（任意）</label><input type="text" id="f-contact" placeholder="090-xxxx-xxxx"></div>
    </div>
  </div>
  <div class="card">
    <div class="sect-hd"><i class="ti ti-users"></i>同伴者<span style="font-size:11px;color:#5a805a;font-weight:400;margin-left:6px">（同行者がいる場合に追加）</span></div>
    <div id="companion-list" class="companion-list"></div>
    <button style="margin-top:8px;font-size:12px" onclick="addCompanionRow()"><i class="ti ti-user-plus"></i> 同伴者を追加</button>
  </div>
  <div class="card">
    <div class="sect-hd"><i class="ti ti-map-pin"></i>立入内容</div>
    <div class="fg">
      <div class="fgi"><label>立入区域</label><input type="text" id="f-area" placeholder="選択または直接入力" list="dl-areas"></div>
      <div class="fgi"><label>消毒実施</label><input type="text" id="f-disinfect" placeholder="選択または直接入力" list="dl-disinfects"></div>
      <div class="fgi span2"><label>立入の理由・目的 *</label><input type="text" id="f-purpose" placeholder="選択または直接入力" list="dl-purposes"></div>
      <div class="fgi span2"><label>直前の農場等への立入</label><input type="text" id="f-prev" placeholder="選択または直接入力" list="dl-prevs"></div>
      <div class="fgi span2"><label>備考</label><input type="text" id="f-note" placeholder="特記事項があれば"></div>
    </div>
  </div>
  <div class="btn-row">
    <button class="pri" onclick="addRecord()"><i class="ti ti-device-floppy"></i> 記録を保存</button>
    <button onclick="clearForm()"><i class="ti ti-refresh"></i> クリア</button>
  </div>
</div>

<div id="pane-list" style="display:none">
  <div class="stat-row">
    <div class="stat"><div class="lbl">総立入件数</div><div class="val" id="st-total">0</div></div>
    <div class="stat"><div class="lbl">今月</div><div class="val" id="st-month">0</div></div>
    <div class="stat"><div class="lbl">直近30日</div><div class="val" id="st-30">0</div></div>
  </div>
  <div class="srch-row">
    <input type="text" id="s-kw" placeholder="氏名・所属・目的で検索…" oninput="renderList()" style="flex:1;min-width:120px">
    <input type="month" id="s-month" oninput="renderList()" style="max-width:150px">
    <button onclick="syncNow()"><i class="ti ti-cloud-download"></i> 最新データ取得</button>
    <button onclick="exportCSV()"><i class="ti ti-download"></i> CSV</button>
  </div>
  <div style="overflow-x:auto">
  <table>
    <colgroup><col style="width:70px"><col style="width:42px"><col style="width:85px"><col style="width:55px"><col style="width:62px"><col style="width:105px"><col style="width:68px"><col style="width:80px"><col style="width:38px"></colgroup>
    <thead><tr><th>年月日</th><th>時刻</th><th>所属会社</th><th>役職</th><th>氏名</th><th>立入理由・目的</th><th>立入区域</th><th>同伴者</th><th></th></tr></thead>
    <tbody id="list-body"></tbody>
  </table>
  </div>
  <div id="list-empty" class="empty" style="display:none">記録がありません</div>
</div>

<div id="pane-pdf" style="display:none">
  <div class="pdf-box">
    <div class="pbhd"><i class="ti ti-file-type-pdf" style="font-size:16px"></i>PDF出力する期間の選択</div>
    <div class="mode-row">
      <button class="modeBtn sel" id="mb-range" onclick="setPdfMode('range')">① 開始日〜終了日</button>
      <button class="modeBtn" id="mb-month" onclick="setPdfMode('month')">② 月を指定</button>
      <button class="modeBtn" id="mb-year" onclick="setPdfMode('year')">③ 年を指定</button>
    </div>
    <div id="cond-range" class="cond-row">
      <label>開始日</label><input type="date" id="p-from" style="width:138px" oninput="updatePdfCount()">
      <label>〜　終了日</label><input type="date" id="p-to" style="width:138px" oninput="updatePdfCount()">
    </div>
    <div id="cond-month" class="cond-row" style="display:none">
      <label>対象月</label><select id="p-month" style="width:180px" onchange="updatePdfCount()"></select>
    </div>
    <div id="cond-year" class="cond-row" style="display:none">
      <label>対象年</label><select id="p-year" style="width:140px" onchange="updatePdfCount()"></select>
    </div>
    <div style="font-size:12px;color:#3a5c3a;margin-bottom:12px">
      対象件数：<span class="cnt-badge" id="pdf-count">0件</span>
      <span style="color:#5a805a;margin-left:8px">（同伴者は別行で印刷されます）</span>
    </div>
    <button class="pri" onclick="genPDF()"><i class="ti ti-file-type-pdf"></i> PDFを生成してダウンロード</button>
  </div>
</div>

<div id="pane-master" style="display:none">
  <div class="card">
    <p style="font-size:12px;color:#3a5c3a;margin-bottom:12px">各プルダウンの選択肢を登録・管理します。変更はクラウドに自動保存されます。</p>
    <div class="master-grid" id="master-grid"></div>
  </div>
</div>

</div><!-- /wrap -->

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jspdf-font-noto-sans-jp@1.0.0/dist/NotoSansJP-normal.js"></script>
<script>
// ===================== 設定 =====================
const LS_URL     = 'nk_gas_url';
const LS_RECORDS = 'nkrecs';
const LS_MASTER  = 'nkmaster';

const DEFAULT_MASTER = {
  orgs:['自牧場スタッフ','○○獣医師事務所','△△飼料株式会社','□□家畜商'],
  names:[],
  roles:['獣医師','家畜人工授精師','営業担当','作業員','その他'],
  areas:['飼養衛生管理区域全般','牛舎','豚舎','鶏舎','飼料保管庫','堆肥舎','その他'],
  purposes:['定期健康診断','ワクチン接種','診療・治療','人工授精','飼料納品','家畜輸送','設備点検・修理','巡回指導','その他'],
  prevs:['なし','前日：○○牧場','当日：△△農場','不明'],
  disinfects:['実施（踏み込み槽＋手指消毒）','実施（手指消毒のみ）','実施（車両消毒含む）','未実施'],
};

const MASTER_KEYS = [
  {key:'orgs',label:'所属会社・機関'},{key:'names',label:'氏名'},{key:'roles',label:'役職・資格'},
  {key:'areas',label:'立入区域'},{key:'purposes',label:'立入の理由・目的'},
  {key:'prevs',label:'直前の農場等への立入'},{key:'disinfects',label:'消毒実施'},
];

// ===================== 状態 =====================
function ls(k,def){try{const v=localStorage.getItem(k);return v?JSON.parse(v):def;}catch(e){return def;}}
function lsSet(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch(e){}}

let records = ls(LS_RECORDS, []);
let master  = ls(LS_MASTER,  JSON.parse(JSON.stringify(DEFAULT_MASTER)));
let pdfMode = 'range';
let companionCount = 0;
let gasUrl  = localStorage.getItem(LS_URL) || '';

// ===================== URL保存 =====================
function saveUrl(){
  gasUrl = document.getElementById('gas-url').value.trim();
  localStorage.setItem(LS_URL, gasUrl);
}

// ===================== クラウド同期 =====================
async function syncNow(){
  if(!gasUrl){ setStatus('off','URLが未設定です'); return; }
  setStatus('spin','同期中…');
  try {
    // 記録取得
    const rRes = await fetch(gasUrl + '?action=getRecords');
    const rData = await rRes.json();
    if(!rData.ok) throw new Error(rData.error);
    records = rData.records;
    lsSet(LS_RECORDS, records);

    // マスタ取得
    const mRes = await fetch(gasUrl + '?action=getMaster');
    const mData = await mRes.json();
    if(mData.ok && mData.master) {
      master = mData.master;
      lsSet(LS_MASTER, master);
    }

    initForm();
    updateDataLists();
    renderList();
    renderMasterGrid();
    setStatus('ok', '同期済み ' + nowHM());
  } catch(e) {
    setStatus('err', '接続エラー: ' + e.message);
  }
}

async function postGas(payload){
  if(!gasUrl) return null;
  const res = await fetch(gasUrl, {
    method:'POST',
    body: JSON.stringify(payload),
  });
  return res.json();
}

function setStatus(state, label){
  const dot = document.getElementById('sync-dot');
  const lbl = document.getElementById('sync-label');
  dot.className = 'dot ' + (state==='ok'?'dot-ok':state==='err'?'dot-err':'dot-off');
  if(state==='spin'){
    lbl.innerHTML = '<span class="spinner"></span> ' + label;
  } else {
    lbl.textContent = label;
  }
}

async function addRecord(){
  const date=g('f-date'),name=g('f-name'),org=g('f-org'),purpose=g('f-purpose');
  if(!date||!name||!org||!purpose){flash('必須項目（*）を選択・入力してください','ng');return;}
  const companions=getCompanions();
  const rec={id:Date.now(),date,time:g('f-time'),org,name,role:g('f-role'),contact:g('f-contact'),area:g('f-area'),purpose,prev:g('f-prev'),disinfect:g('f-disinfect'),note:g('f-note'),companions};

  records.unshift(rec);
  lsSet(LS_RECORDS,records);
  autoLearn(rec);
  clearForm();
  flash(`記録を保存しました${companions.length?'（同伴者'+companions.length+'名含む）':''}（クラウドに送信中…）`,'info');
  renderList();

  if(gasUrl){
    try{
      const r=await postGas({action:'saveRecord',record:rec});
      if(r&&r.ok) flash(`記録を保存しました${companions.length?'（同伴者'+companions.length+'名含む）':''}　クラウドに同期済み`,'ok');
      else flash('ローカルに保存済み。クラウド送信に失敗しました。','ng');
    }catch(e){flash('ローカルに保存済み。クラウド送信に失敗しました: '+e.message,'ng');}
  } else {
    flash(`記録を保存しました${companions.length?'（同伴者'+companions.length+'名含む）':''}（ローカル保存）`,'ok');
  }
}

function autoLearn(rec){
  let changed=false;
  const map={org:'orgs',name:'names',role:'roles',area:'areas',purpose:'purposes',prev:'prevs',disinfect:'disinfects'};
  Object.entries(map).forEach(([k,mk])=>{if(rec[k]&&!master[mk].includes(rec[k])){master[mk].push(rec[k]);changed=true;}});
  (rec.companions||[]).forEach(c=>{
    ['name','org','role'].forEach((k,i)=>{const mk=['names','orgs','roles'][i];if(c[k]&&!master[mk].includes(c[k])){master[mk].push(c[k]);changed=true;}});
  });
  if(changed){lsSet(LS_MASTER,master);if(gasUrl)postGas({action:'saveMaster',master});}
}

// ① 日付・時刻を見やすい形式に変換
function fmtDate(d){
  if(!d)return'—';
  // Dateオブジェクトで来た場合も対応
  if(d instanceof Date){
    return`${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日`;
  }
  const s=String(d);
  // YYYY-MM-DD形式
  const parts=s.split('-');
  if(parts.length===3&&parts[0].length===4){
    return`${parts[0]}年${parseInt(parts[1])}月${parseInt(parts[2])}日`;
  }
  return s;
}
function fmtTime(t){
  if(!t&&t!==0)return'—';
  const s=String(t).trim();
  if(!s||s==='—')return'—';
  // HH:MM または H:MM 形式ならそのまま返す
  const m1=s.match(/^(\d{1,2}):(\d{2})/);
  if(m1){
    // 1899が含まれていたら時刻部分だけ抜き出す
    if(s.includes('1899')||s.includes('1900')){
      return`${m1[1].padStart(2,'0')}:${m1[2]}`;
    }
    return`${m1[1].padStart(2,'0')}:${m1[2]}`;
  }
  // 「1899/12/30 10:05:00」や「1899-12-30T10:05:00」形式
  const m2=s.match(/(\d{1,2}):(\d{2})(?::\d{2})?/);
  if(m2){
    return`${m2[1].padStart(2,'0')}:${m2[2]}`;
  }
  // 小数（Googleスプレッドシートの内部形式）
  const num=parseFloat(s);
  if(!isNaN(num)&&num>=0&&num<1){
    const totalMin=Math.round(num*24*60);
    const h=Math.floor(totalMin/60);
    const m=totalMin%60;
    return`${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`;
  }
  return'—';
}

function renderList(){
  const kw=g('s-kw').toLowerCase(),fm=document.getElementById('s-month').value;
  const now=new Date(),ym=`${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
  const d30=new Date(now-30*864e5).toISOString().split('T')[0];
  // ② 日付・時刻の古い順にソート
  const filtered=records.filter(r=>{
    const txt=(r.name+r.org+r.purpose+r.role+(r.companions||[]).map(c=>c.name+c.org).join('')).toLowerCase();
    return(!kw||txt.includes(kw))&&(!fm||r.date.startsWith(fm));
  }).slice().sort((a,b)=>a.date.localeCompare(b.date)||(a.time||'').localeCompare(b.time||''));
  document.getElementById('st-total').textContent=records.length;
  document.getElementById('st-month').textContent=records.filter(r=>r.date.startsWith(ym)).length;
  document.getElementById('st-30').textContent=records.filter(r=>r.date>=d30).length;
  const tbody=document.getElementById('list-body');tbody.innerHTML='';
  document.getElementById('list-empty').style.display=filtered.length?'none':'';
  filtered.forEach(r=>{
    const cmps=r.companions||[];
    const cmpHtml=cmps.length?cmps.map(c=>`<span class="companion-tag">${esc(c.name||'—')}${c.org?'・'+esc(c.org):''}</span>`).join(''):'—';
    const tr=document.createElement('tr');
    tr.innerHTML=`<td>${fmtDate(r.date)}</td><td>${fmtTime(r.time)}</td><td title="${esc(r.org)}">${esc(r.org)}</td><td>${esc(r.role||'—')}</td><td>${esc(r.name)}</td><td title="${esc(r.purpose)}">${esc(r.purpose)}</td><td>${esc(r.area||'—')}</td><td>${cmpHtml}</td><td><button class="del-btn" onclick="delRec(${r.id})">×</button></td>`;
    tbody.appendChild(tr);
  });
}

function getFilteredForPdf(){
  let f;
  if(pdfMode==='range'){const from=document.getElementById('p-from').value,to=document.getElementById('p-to').value;if(!from||!to)return[];f=records.filter(r=>r.date>=from&&r.date<=to);}
  else if(pdfMode==='month'){const m=document.getElementById('p-month').value;if(!m)return[];f=records.filter(r=>r.date.startsWith(m));}
  else{const y=document.getElementById('p-year').value;if(!y)return[];f=records.filter(r=>r.date.startsWith(y));}
  return f.slice().sort((a,b)=>a.date.localeCompare(b.date)||(a.time||'').localeCompare(b.time||''));
}

function getPdfTitle(){
  if(pdfMode==='range'){const from=document.getElementById('p-from').value,to=document.getElementById('p-to').value;return`${from} ～ ${to}`;}
  else if(pdfMode==='month'){const m=document.getElementById('p-month').value;if(!m)return'';const[y,mo]=m.split('-');return`${y}年${parseInt(mo)}月`;}
  else{const y=document.getElementById('p-year').value;return y?`${y}年`:'';} 
}

function genPDF(){
  const filtered=getFilteredForPdf();
  if(!filtered.length){alert('対象期間の記録がありません。');return;}
  if(typeof window.jspdf==='undefined'&&typeof jsPDF==='undefined'){alert('PDFライブラリ読込中です。少し待って再試行してください。');return;}
  const{jsPDF}=window.jspdf||{jsPDF:window.jsPDF};
  const doc=new jsPDF({orientation:'portrait',unit:'mm',format:'a4'});

  // 日本語フォント設定
  const useJP = typeof doc.getFontList === 'function' && doc.getFontList()['NotoSansJP'];
  if(useJP){ doc.setFont('NotoSansJP','normal'); }

  function safeText(doc,text,x,y,opts){
    if(useJP) doc.setFont('NotoSansJP','normal');
    try{ doc.text(String(text||''),x,y,opts); }catch(e){ doc.text('',x,y,opts||{}); }
  }
  function safeBoldText(doc,text,x,y,opts){
    if(useJP) doc.setFont('NotoSansJP','normal');
    else doc.setFont('helvetica','bold');
    try{ doc.text(String(text||''),x,y,opts); }catch(e){ doc.text('',x,y,opts||{}); }
  }

  const PW=210,ML=7,MR=7,MT=16,CW=PW-ML-MR;
  // ④ 45行に変更。行高を調整してA4に収める
  const ROWS_PER_PAGE=45,HDR_H=8;
  // A4の印刷エリア = 297 - MT(16) - MB(8) = 273mm
  // HDR_H(8) + 45行 = 273mm → 1行 = (273-8)/45 ≒ 5.89mm → 5.8mmに設定
  const ROW_H=5.8;

  const COLS=[
    {label:'年月日',w:22,key:'date'},
    {label:'時刻',w:11,key:'time'},
    {label:'所属会社名',w:33,key:'org'},
    {label:'役職・資格',w:20,key:'role'},
    {label:'氏名',w:18,key:'name'},
    {label:'立入の理由・目的',w:36,key:'purpose'},
    {label:'立入区域',w:18,key:'area'},
    {label:'直前農場立入',w:21,key:'prev'},
    {label:'連絡先',w:17,key:'contact'},
  ];

  const titleStr=getPdfTitle();
  const rows=[];
  filtered.forEach(r=>{
    // ① 日付・時刻をフォーマットしてPDFに渡す
    const displayDate=fmtDate(r.date);
    const displayTime=fmtTime(r.time);
    rows.push({...r, date:displayDate, time:displayTime, _type:'main'});
    (r.companions||[]).forEach(c=>rows.push({
      _type:'companion',
      date:'',time:'',
      org:c.org||'',role:c.role||'',name:c.name||'',
      purpose:'〔同伴〕',area:'',prev:'',contact:'',
    }));
  });

  const totalPages=Math.ceil(rows.length/ROWS_PER_PAGE)||1;
  for(let pg=0;pg<totalPages;pg++){
    if(pg>0)doc.addPage();
    doc.setFillColor(240,247,240);doc.rect(0,0,PW,297,'F');
    doc.setFillColor(195,228,195);doc.rect(ML,4,CW,10,'F');

    // ヘッダータイトル
    doc.setFillColor(195,228,195);doc.rect(ML,4,CW,10,'F');
    doc.setFontSize(9);doc.setTextColor(20,60,20);
    safeBoldText(doc,'飼養衛生管理区域 立入記録簿',ML+2,10.5);
    doc.setFontSize(7.5);
    safeText(doc,`対象期間：${titleStr}　出力日：${today()}　${pg+1}/${totalPages}ページ`,PW-MR,10.5,{align:'right'});

    const y0=MT;
    doc.setFillColor(165,208,165);doc.rect(ML,y0,CW,HDR_H,'F');
    doc.setFontSize(6.5);doc.setTextColor(15,50,15);
    let x=ML;
    COLS.forEach(col=>{
      safeBoldText(doc,col.label,x+col.w/2,y0+5,{align:'center',maxWidth:col.w-1});
      x+=col.w;
    });

    doc.setFontSize(6);
    const pageRows=rows.slice(pg*ROWS_PER_PAGE,(pg+1)*ROWS_PER_PAGE);

    for(let i=0;i<ROWS_PER_PAGE;i++){
      const ry=y0+HDR_H+i*ROW_H;
      const isC=i<pageRows.length&&pageRows[i]._type==='companion';
      doc.setFillColor(isC?232:(i%2===0?248:255),isC?246:(i%2===0?253:255),isC?232:(i%2===0?248:255));
      doc.rect(ML,ry,CW,ROW_H,'F');

      if(i<pageRows.length){
        const r=pageRows[i];let cx=ML;
        doc.setTextColor(isC?60:20,isC?100:40,isC?60:20);
        COLS.forEach(col=>{
          safeText(doc,String(r[col.key]||''),cx+1,ry+ROW_H*0.65,{maxWidth:col.w-2});
          cx+=col.w;
        });
      }

      doc.setDrawColor(175,218,175);doc.setLineWidth(0.1);
      let lx=ML;
      COLS.forEach(col=>{doc.line(lx,ry,lx,ry+ROW_H);lx+=col.w;});
      doc.line(lx,ry,lx,ry+ROW_H);
      doc.line(ML,ry+ROW_H,ML+CW,ry+ROW_H);
    }
    doc.setDrawColor(130,185,130);doc.setLineWidth(0.3);
    doc.rect(ML,y0,CW,HDR_H+ROWS_PER_PAGE*ROW_H,'S');
  }
  doc.save(`立入記録_${titleStr.replace(/[\s\/～〜年月]/g,'_')}.pdf`);
}
